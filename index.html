<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IPTV — Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: #000; color: #fff; }
        body { font-family: system-ui, -apple-system, sans-serif; -webkit-user-select: none; user-select: none; }

        #video {
            position: fixed; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; background: #000;
        }

        /* ── LOADER — compacto, centrado, no bloquea interacción ── */
        #loader {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 0.6rem;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.4rem 2rem;
            min-width: 160px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #loader.visible { opacity: 1; }
        .spinner {
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1); border-top-color: #fff;
            animation: spin 0.75s linear infinite;
        }
        #loader-label {
            font-size: 0.75rem; color: rgba(255,255,255,0.5);
            letter-spacing: 0.04em; text-align: center;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ERROR — igual de compacto ── */
        #error-state {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 45;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 0.4rem;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.2rem 1.8rem;
            min-width: 160px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #error-state.visible { opacity: 1; }
        .err-icon { font-size: 1.6rem; opacity: 0.45; }
        .err-text { font-size: 0.78rem; color: rgba(255,255,255,0.45); text-align: center; }

        /* ── OSD ─────────────────────────────────────── */
        #osd {
            position: fixed; top: 0; left: 0; right: 0; z-index: 30;
            padding: 2rem 2.5rem 5rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.88) 0%, transparent 100%);
            display: flex; align-items: flex-start; justify-content: space-between;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #osd.visible { opacity: 1; pointer-events: auto; }

        .osd-left { display: flex; align-items: flex-start; gap: 1.25rem; }

        #osd-logo {
            width: 64px; height: 64px; border-radius: 14px;
            object-fit: contain; background: rgba(255,255,255,0.08);
            padding: 8px; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .live-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: #f87171; margin-bottom: 5px;
        }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%; background: #ef4444;
            animation: blink 1.4s ease infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

        #osd-title {
            font-size: clamp(1.8rem, 4.5vw, 3.2rem);
            font-weight: 800; line-height: 1; letter-spacing: -0.03em;
        }
        #osd-source-label {
            font-size: 0.75rem; color: rgba(255,255,255,0.35);
            margin-top: 6px; font-weight: 500;
        }

        #source-switcher { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .src-btn {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
            text-transform: uppercase; padding: 4px 10px;
            border-radius: 6px; border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
            cursor: pointer; transition: all 0.15s ease;
        }
        .src-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .src-btn.active { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.45); }

        .osd-actions { display: flex; align-items: flex-start; gap: 0.5rem; padding-top: 4px; }
        .osd-btn {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 10px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer; color: #fff;
            transition: background 0.15s ease, transform 0.1s ease;
        }
        .osd-btn:hover { background: rgba(255,255,255,0.2); }
        .osd-btn:active { transform: scale(0.93); }
        .osd-btn svg { width: 18px; height: 18px; }

        /* ── UI INFERIOR ─────────────────────────────── */
        #ui {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
            padding: 6rem 2rem 1.75rem;
            background: linear-gradient(to top, rgba(0,0,0,0.96) 35%, transparent 100%);
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #ui.visible { opacity: 1; pointer-events: auto; }

        .ui-header {
            display: flex; align-items: flex-end; justify-content: space-between;
            margin-bottom: 1rem; padding: 0 0.2rem;
        }
        .ui-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
        .ui-hint { font-size: 0.72rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
        .brand { font-size: 0.9rem; font-weight: 800; letter-spacing: -0.04em; color: rgba(255,255,255,0.85); }
        .brand em { color: rgba(255,255,255,0.3); font-style: normal; }

        #carousel {
            display: flex; gap: 0.9rem;
            overflow-x: auto; scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            padding-bottom: 2px;
            scrollbar-width: none;
        }
        #carousel::-webkit-scrollbar { display: none; }

        .ch-card {
            flex: 0 0 auto; scroll-snap-align: start;
            width: 200px; border-radius: 12px; overflow: hidden;
            background: rgba(255,255,255,0.055);
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer; outline: none; position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .ch-card:hover, .ch-card:focus {
            transform: translateY(-7px) scale(1.03);
            border-color: rgba(255,255,255,0.32);
            box-shadow: 0 18px 40px rgba(0,0,0,0.55);
        }
        .ch-card.active { border-color: rgba(255,255,255,0.55); }
        .ch-card.active::before {
            content: '';
            position: absolute; top: 8px; right: 8px; z-index: 5;
            width: 7px; height: 7px; border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 0 2px rgba(34,197,94,0.25);
            animation: blink 1.4s ease infinite;
        }

        .ch-thumb {
            width: 100%; aspect-ratio: 16/9; overflow: hidden;
            background: rgba(255,255,255,0.025);
        }
        .ch-thumb img {
            width: 100%; height: 100%; object-fit: contain; padding: 10px;
            transition: transform 0.28s ease;
        }
        .ch-card:hover .ch-thumb img,
        .ch-card:focus .ch-thumb img { transform: scale(1.07); }

        .ch-body { padding: 0.65rem 0.8rem 0.75rem; }
        .ch-name {
            font-size: 0.82rem; font-weight: 600; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
        }
        .ch-meta {
            font-size: 0.62rem; font-weight: 600; letter-spacing: 0.07em;
            text-transform: uppercase; color: rgba(255,255,255,0.28);
            display: flex; align-items: center; gap: 5px;
        }
        .ch-src-count {
            background: rgba(255,255,255,0.1); border-radius: 4px;
            padding: 1px 5px; color: rgba(255,255,255,0.45);
        }

        #toast {
            position: fixed; bottom: 1.5rem; left: 50%; z-index: 200;
            transform: translateX(-50%) translateY(8px);
            background: rgba(25,25,25,0.92);
            border: 1px solid rgba(255,255,255,0.13);
            backdrop-filter: blur(14px);
            color: rgba(255,255,255,0.85); font-size: 0.78rem; font-weight: 500;
            padding: 0.45rem 1.1rem; border-radius: 999px; white-space: nowrap;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #fs-hint {
            position: fixed; top: 50%; left: 50%; z-index: 60;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.72); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
            padding: 1.5rem 2rem; text-align: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #fs-hint.show { opacity: 1; }
        #fs-hint h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
        #fs-hint p { font-size: 0.78rem; color: rgba(255,255,255,0.45); }
        .fs-key {
            display: inline-block; background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 5px;
            padding: 1px 7px; font-family: monospace; font-size: 0.8rem; color: #fff;
        }

        @media (hover: hover) {
            #carousel { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
            #carousel::-webkit-scrollbar { display: block; height: 3px; }
            #carousel::-webkit-scrollbar-track { background: transparent; }
            #carousel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        }

        /* ── IFRAME MODE ────────────────────────────── */
        #iframe-player {
            position: fixed; inset: 0; width: 100%; height: 100%;
            z-index: 1; border: none; background: #000;
            display: none;
        }
        #iframe-player.active { display: block; }

        /* Badge MPD en cards */
        .ch-badge-mpd {
            font-size: 0.58rem; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; padding: 2px 6px;
            border-radius: 4px; background: rgba(139,92,246,0.25);
            color: rgba(167,139,250,0.9);
            border: 1px solid rgba(139,92,246,0.3);
            flex-shrink: 0;
        }

        /* ── UNMUTE OVERLAY ─────────────────────────── */
        #unmute-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #unmute-overlay.visible { opacity: 1; pointer-events: auto; }
        #unmute-btn {
            display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22);
            border-radius: 20px; padding: 2rem 2.8rem; cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
            color: #fff;
        }
        #unmute-btn:hover { background: rgba(255,255,255,0.18); }
        #unmute-btn:active { transform: scale(0.96); }
        #unmute-btn svg { width: 44px; height: 44px; opacity: 0.9; }
        #unmute-btn span { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.04em; opacity: 0.7; }
    </style>
</head>

// ── DOM ─────────────────────────────────────────────
const video         = document.getElementById('video');
const iframePlayer  = document.getElementById('iframe-player');
const loader        = document.getElementById('loader');
const loaderLabel   = document.getElementById('loader-label');
const errorState    = document.getElementById('error-state');
const osd           = document.getElementById('osd');
const osdTitle      = document.getElementById('osd-title');
const osdLogo       = document.getElementById('osd-logo');
const osdSrcLbl     = document.getElementById('osd-source-label');
const srcSwitcher   = document.getElementById('source-switcher');
const ui            = document.getElementById('ui');
const carousel      = document.getElementById('carousel');
const toast         = document.getElementById('toast');
const fsBtn         = document.getElementById('fs-btn');
const fsIconEnter   = document.getElementById('fs-icon-enter');
const fsIconExit    = document.getElementById('fs-icon-exit');
const fsHint        = document.getElementById('fs-hint');
const unmuteOverlay = document.getElementById('unmute-overlay');
const unmuteBtn     = document.getElementById('unmute-btn');

let hlsInstance = null;
let currentCh   = -1;
let currentSrc  = 0;
let uiTimer     = null;
let osdTimer    = null;
let toastTimer  = null;
let loadTimer   = null;
let userUnmuted = false;

// ── PROXY ────────────────────────────────────────────
const PROXY = "/proxy?url=";

// ── LOADER ───────────────────────────────────────────
function showLoader(label = 'Conectando…') {
    loaderLabel.textContent = label;
    loader.classList.add('visible');
    errorState.classList.remove('visible');
}
function hideLoader() { loader.classList.remove('visible'); }
function showError() {
    hideLoader();
    errorState.classList.add('visible');
    setTimeout(() => errorState.classList.remove('visible'), 3500);
}

// ── TOAST ────────────────────────────────────────────
function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

// ── OSD ──────────────────────────────────────────────
function showOSD(ch, srcIdx) {
    clearTimeout(osdTimer);
    osdTitle.textContent  = ch.name;
    osdLogo.src           = ch.poster || '';
    osdLogo.style.display = ch.poster ? 'block' : 'none';
    osdSrcLbl.textContent = (!ch.iframeUrl && ch.urls && ch.urls.length > 1)
        ? `Fuente ${srcIdx + 1} de ${ch.urls.length}` : '';

    srcSwitcher.innerHTML = '';
    if (!ch.iframeUrl && ch.urls && ch.urls.length > 1) {
        ch.urls.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className   = 'src-btn' + (i === srcIdx ? ' active' : '');
            btn.textContent = `Fuente ${i + 1}`;
            btn.addEventListener('click', e => { e.stopPropagation(); playSource(currentCh, i); });
            srcSwitcher.appendChild(btn);
        });
    }

    osd.classList.add('visible');
    osdTimer = setTimeout(() => osd.classList.remove('visible'), 3000);
}

// ── UI ───────────────────────────────────────────────
function showUI() {
    clearTimeout(uiTimer);
    ui.classList.add('visible');

    if (currentCh >= 0) {
        clearTimeout(osdTimer);
        osd.classList.add('visible');
    }

    uiTimer = setTimeout(() => {
        ui.classList.remove('visible');
        osd.classList.remove('visible');
    }, 3000);
}

// ── FULLSCREEN ───────────────────────────────────────
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen()
            .catch(() => showToast('El navegador bloqueó pantalla completa'));
    } else {
        document.exitFullscreen();
    }
}

document.addEventListener('fullscreenchange', () => {
    const full = !!document.fullscreenElement;
    fsIconEnter.style.display = full ? 'none' : '';
    fsIconExit.style.display  = full ? '' : 'none';
});

fsBtn.addEventListener('click', () => {
    toggleFullscreen();
    if (currentCh >= 0) showOSD(CHANNELS[currentCh], currentSrc);
});

// ── MODO VIDEO vs IFRAME ─────────────────────────────
function setVideoMode(mode) {
    if (mode === 'iframe') {
        video.pause();
        video.removeAttribute('src');
        video.style.display = 'none';
        iframePlayer.classList.add('active');
    } else {
        iframePlayer.src = 'about:blank';
        iframePlayer.classList.remove('active');
        video.style.display = '';
    }
}

// ── SALTAR AL LIVE EDGE ──────────────────────────────
// Fuerza al video a posicionarse en el borde del live
// para evitar que se quede reproduciendo contenido viejo.
function jumpToLiveEdge() {
    try {
        if (video.seekable && video.seekable.length > 0) {
            const edge = video.seekable.end(video.seekable.length - 1);
            if (isFinite(edge) && edge > 0 && (edge - video.currentTime) > 3) {
                video.currentTime = edge;
            }
        }
    } catch (e) {
        // seekable puede no estar listo aún, ignorar silenciosamente
    }
}

// ── REPRODUCIR FUENTE HLS ────────────────────────────
function playSource(chIdx, srcIdx) {
    const ch = CHANNELS[chIdx];
    const originalUrl = ch.urls[srcIdx];
    if (!originalUrl) return;
    const url = PROXY + encodeURIComponent(originalUrl);

    currentSrc = srcIdx;
    setVideoMode('hls');
    showLoader(srcIdx > 0 ? `Probando fuente ${srcIdx + 2}…` : 'Conectando…');
    showOSD(ch, srcIdx);

    clearTimeout(loadTimer);
    loadTimer = setTimeout(() => {
        hideLoader();
        tryNextSource(chIdx, srcIdx, 'Tiempo agotado');
    }, 11000);

    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    video.removeAttribute('src');

    if (Hls.isSupported()) {
        hlsInstance = new Hls({
            // ── Live edge agresivo — siempre en vivo ──────────
            liveSyncDurationCount:       2,   // sincronizar a 2 segmentos del edge
            liveMaxLatencyDurationCount: 4,   // máximo tolerado: 4 segmentos (~8s)
            liveDurationInfinity:        true, // tratar la duración como infinita (live)
            // ── Buffer mínimo para streams live ───────────────
            maxBufferLength:             8,
            maxMaxBufferLength:          16,
            maxBufferSize:               20 * 1000 * 1000,
            // ── Reintentos de red ──────────────────────────────
            manifestLoadingMaxRetry:     4,
            levelLoadingMaxRetry:        4,
            fragLoadingMaxRetry:         6,
            manifestLoadingRetryDelay:   1000,
            levelLoadingRetryDelay:      1000,
            fragLoadingRetryDelay:       500,
            lowLatencyMode:              false,
        });

        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            // Saltar al borde del live inmediatamente al cargar
            jumpToLiveEdge();
            if (userUnmuted) video.muted = false;
            video.play().catch(() => {});
        });

        // Cada vez que se carga un nuevo fragmento, verificar que
        // seguimos en el live edge (por si el usuario pausó o hubo lag)
        hlsInstance.on(Hls.Events.FRAG_LOADED, () => {
            jumpToLiveEdge();
        });

        hlsInstance.on(Hls.Events.ERROR, (_, data) => {
            if (!data.fatal) return;
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                hlsInstance.startLoad();
                return;
            }
            clearTimeout(loadTimer);
            tryNextSource(chIdx, srcIdx, 'Error de señal');
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari nativo — usar seekable para saltar al live edge
        video.src = url;
        video.load();
        video.addEventListener('loadedmetadata', () => {
            jumpToLiveEdge();
            video.play().catch(() => {});
        }, { once: true });
    } else {
        clearTimeout(loadTimer);
        hideLoader();
        showToast('Tu navegador no soporta HLS');
    }
}

// ── REPRODUCIR CANAL IFRAME (MPD/DRM) ────────────────
function playIframe(chIdx) {
    const ch = CHANNELS[chIdx];
    if (!ch.iframeUrl) return;
    currentSrc = 0;
    setVideoMode('iframe');
    showLoader('Cargando señal…');
    showOSD(ch, 0);
    clearTimeout(loadTimer);
    loadTimer = setTimeout(() => hideLoader(), 5000);
    iframePlayer.src = ch.iframeUrl;
}

function tryNextSource(chIdx, srcIdx, reason) {
    const ch = CHANNELS[chIdx];
    if (srcIdx + 1 < ch.urls.length) {
        showToast(`${reason} — probando fuente ${srcIdx + 2}…`);
        playSource(chIdx, srcIdx + 1);
    } else {
        showError();
        if (ch.urls.length > 1) showToast('Sin señal disponible en ninguna fuente');
    }
}

// ── REPRODUCIR CANAL ─────────────────────────────────
function playChannel(idx) {
    const ch = CHANNELS[idx];
    if (!ch) return;
    document.querySelectorAll('.ch-card').forEach((el, i) => el.classList.toggle('active', i === idx));
    currentCh = idx;
    if (ch.iframeUrl) {
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        playIframe(idx);
    } else {
        setVideoMode('hls');
        playSource(idx, 0);
    }
}

// ── EVENTOS NATIVOS VIDEO ────────────────────────────
let waitingTimer = null;
video.addEventListener('playing', () => {
    clearTimeout(loadTimer);
    clearTimeout(waitingTimer);
    waitingTimer = null;
    hideLoader();
    if (!userUnmuted && video.muted) {
        unmuteOverlay.classList.add('visible');
    }
});

// Esperar 1.5s antes de mostrar spinner — ignora micro-cortes transitorios
video.addEventListener('waiting', () => {
    if (currentCh < 0) return;
    if (waitingTimer) return;
    waitingTimer = setTimeout(() => {
        waitingTimer = null;
        if (video.paused || video.readyState < 3) showLoader('Recuperando señal…');
    }, 1500);
});

video.addEventListener('error', () => {
    clearTimeout(loadTimer);
    tryNextSource(currentCh, currentSrc, 'Error');
});

// ── UNMUTE ───────────────────────────────────────────
unmuteBtn.addEventListener('click', () => {
    video.muted   = false;
    userUnmuted   = true;
    unmuteOverlay.classList.remove('visible');
    if (video.paused) video.play().catch(() => {});
});

// ── RENDER ───────────────────────────────────────────
function renderCarousel() {
    carousel.innerHTML = '';
    CHANNELS.forEach((ch, i) => {
        const card = document.createElement('div');
        card.className = 'ch-card';
        card.tabIndex  = i + 1;

        let badge = '';
        if (ch.iframeUrl) {
            badge = `<span class="ch-badge-mpd">MPD</span>`;
        } else if (ch.urls && ch.urls.length > 1) {
            badge = `<span class="ch-src-count">${ch.urls.length} fuentes</span>`;
        }

        card.innerHTML = `
            <div class="ch-thumb">
                <img src="${ch.poster || ''}" alt="${ch.name}" onerror="this.style.display='none'">
            </div>
            <div class="ch-body">
                <div class="ch-name">${ch.name}</div>
                <div class="ch-meta">${ch.group}${badge}</div>
            </div>`;

        card.addEventListener('click',   ()  => { playChannel(i); showUI(); });
        card.addEventListener('keydown', e   => { if (e.key === 'Enter') { playChannel(i); showUI(); } });
        card.addEventListener('focus',   ()  => { showUI(); card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); });
        carousel.appendChild(card);
    });
}

// ── TECLADO ───────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullscreen(); return; }
    showUI();
    if (!ui.classList.contains('visible')) return;

    const cards = [...carousel.querySelectorAll('.ch-card')];
    const idx   = cards.indexOf(document.activeElement);

    if (e.key === 'ArrowRight')      { e.preventDefault(); (cards[Math.min(idx + 1, cards.length - 1)] || cards[0]).focus(); }
    else if (e.key === 'ArrowLeft')  { e.preventDefault(); cards[Math.max(idx - 1, 0)].focus(); }
    else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') { e.preventDefault(); cards[idx >= 0 ? idx : 0]?.focus(); }
});

document.addEventListener('mousemove',  showUI);
document.addEventListener('touchstart', showUI, { passive: true });

// ── HINT FULLSCREEN (solo desktop, solo primera vez) ──
const isTouch = window.matchMedia('(hover: none)').matches;
if (!isTouch && !sessionStorage.getItem('iptv_fsh')) {
    sessionStorage.setItem('iptv_fsh', '1');
    setTimeout(() => {
        fsHint.classList.add('show');
        setTimeout(() => fsHint.classList.remove('show'), 4000);
    }, 2200);
}

// ── INIT ──────────────────────────────────────────────
renderCarousel();
setTimeout(() => {
    if (CHANNELS.length > 0) {
        playChannel(0);
        showUI();
        carousel.querySelector('.ch-card')?.focus();
    }
}, 300);
</script>
</body>

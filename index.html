<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Canales TV</title>
    <link rel="icon" type="image/png" href="tv-favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="cast.js"></script>
    <style>
        /* ══════════════════════════════════════════════════════
           BASE
        ══════════════════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%; overflow: hidden;
            background: #000; color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── VIDEO ── */
        #video {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: contain; z-index: 1; background: #000;
        }

        /* ── IFRAME MODE ── */
        #iframe-player {
            position: fixed; inset: 0; width: 100%; height: 100%;
            z-index: 1; border: none; background: #000; display: none;
        }
        #iframe-player.active { display: block; }

        /* ══════════════════════════════════════════════════════
           LOADER / ERROR
        ══════════════════════════════════════════════════════ */
        #loader, #error-state {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 0.6rem;
            background: rgba(0,0,0,0.82); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 18px;
            padding: 1.6rem 2.2rem; min-width: 160px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #error-state { z-index: 45; }
        #loader.visible, #error-state.visible { opacity: 1; }
        .spinner {
            width: 38px; height: 38px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1); border-top-color: #fff;
            animation: spin 0.75s linear infinite;
        }
        #loader-label { font-size: 0.78rem; color: rgba(255,255,255,0.5); letter-spacing: 0.04em; text-align: center; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .err-icon { font-size: 1.8rem; opacity: 0.4; }
        .err-text { font-size: 0.8rem; color: rgba(255,255,255,0.45); text-align: center; }

        /* ══════════════════════════════════════════════════════
           OSD — top overlay con info del canal
        ══════════════════════════════════════════════════════ */
        #osd {
            position: fixed; top: 0; left: 0; right: 0; z-index: 30;
            padding: 1.4rem 1.6rem 5rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex; align-items: flex-start; justify-content: space-between;
            opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
        }
        #osd.visible { opacity: 1; pointer-events: auto; }
        .osd-left { display: flex; align-items: flex-start; gap: 1rem; }
        #osd-logo {
            width: 52px; height: 52px; border-radius: 12px;
            object-fit: contain; background: rgba(255,255,255,0.08);
            padding: 7px; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .live-badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
            text-transform: uppercase; color: #f87171; margin-bottom: 4px;
        }
        .live-dot {
            width: 6px; height: 6px; border-radius: 50%; background: #ef4444;
            animation: blink 1.4s ease infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
        #osd-title {
            font-size: clamp(1.4rem, 5vw, 3rem);
            font-weight: 800; line-height: 1; letter-spacing: -0.03em;
        }
        #osd-source-label {
            font-size: 0.72rem; color: rgba(255,255,255,0.35); margin-top: 5px; font-weight: 500;
        }
        #source-switcher { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .src-btn {
            font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em;
            text-transform: uppercase; padding: 4px 10px;
            border-radius: 6px; border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
            cursor: pointer; transition: all 0.15s ease;
        }
        .src-btn:hover, .src-btn:focus { background: rgba(255,255,255,0.18); color: #fff; outline: none; }
        .src-btn.active { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.45); }
        .osd-actions { display: flex; align-items: flex-start; gap: 0.5rem; padding-top: 2px; flex-shrink: 0; }
        .osd-btn {
            display: flex; align-items: center; justify-content: center;
            width: 42px; height: 42px; border-radius: 11px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer; color: #fff;
            transition: background 0.15s ease, transform 0.1s ease;
            flex-shrink: 0;
        }
        .osd-btn:hover, .osd-btn:focus { background: rgba(255,255,255,0.22); outline: none; }
        .osd-btn:active { transform: scale(0.91); }
        .osd-btn svg { width: 18px; height: 18px; }

        /* ══════════════════════════════════════════════════════
           UI INFERIOR — panel de canales (overlay)
        ══════════════════════════════════════════════════════ */
        #ui {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 20;
            padding-top: 1.6rem;
            padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
            background: linear-gradient(to top,
                rgba(0,0,0,0.97) 0%,
                rgba(0,0,0,0.90) 60%,
                transparent 100%);
            transform: translateY(100%);
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #ui.visible { transform: translateY(0); }

        /* ── Header: tabs arriba, buscador abajo ── */
        .ui-header {
            display: flex; flex-direction: column; gap: 0;
            padding: 0 0 0; margin-bottom: 8px;
        }

        /* ── TABS ROW ── */
        .ui-tabs-row {
            display: flex; align-items: center;
            padding: 0 12px;
        }

        /* ── TABS ── */
        #tabs-row {
            display: flex; gap: 0;
            overflow-x: auto; flex: 1; min-width: 0;
            scrollbar-width: none;
            padding: 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        #tabs-row::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex-shrink: 0;
            font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 7px 14px 8px;
            border: none; border-bottom: 2px solid transparent;
            background: none; color: rgba(255,255,255,0.38);
            cursor: pointer; white-space: nowrap;
            transition: color 0.18s, border-color 0.18s;
            outline: none;
            margin-bottom: -1px;
        }
        .tab-btn:hover { color: rgba(255,255,255,0.75); }
        .tab-btn:focus-visible { color: rgba(255,255,255,0.9); }
        .tab-btn:active { color: rgba(255,255,255,0.9); }
        .tab-btn.active {
            color: #fff; font-weight: 800;
            border-bottom-color: #fff;
        }

        /* ── BUSCADOR — fila propia, ancho completo ── */
        .ui-search-row {
            padding: 8px 12px 0;
        }
        #search-wrap {
            display: flex; align-items: center;
            height: 36px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.13);
            background: rgba(255,255,255,0.07);
            width: 100%;
            transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }
        #search-wrap:focus-within {
            background: rgba(255,255,255,0.10);
            border-color: rgba(255,255,255,0.30);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
        }
        /* Ícono lupa */
        #search-icon-btn {
            flex-shrink: 0;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; cursor: default; pointer-events: none;
            color: rgba(255,255,255,0.35);
            outline: none;
        }
        #search-wrap:focus-within #search-icon-btn { color: rgba(255,255,255,0.6); }
        #search-icon-btn svg { width: 14px; height: 14px; stroke-width: 2.2; }
        /* Input */
        #search-input {
            flex: 1; min-width: 0;
            background: none; border: none; outline: none;
            color: #fff; font-size: 0.82rem; font-weight: 400;
            padding: 0;
            caret-color: #fff;
            font-family: inherit;
            letter-spacing: 0.01em;
        }
        #search-input::placeholder {
            color: rgba(255,255,255,0.25);
            font-weight: 400;
        }
        /* Botón limpiar (×) */
        #search-clear {
            flex-shrink: 0;
            width: 22px; height: 22px; margin-right: 7px;
            border-radius: 50%; border: none; cursor: pointer;
            background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6);
            font-size: 0.8rem; line-height: 1;
            display: none; align-items: center; justify-content: center;
            transition: background 0.15s, color 0.15s;
            font-family: inherit;
        }
        #search-clear:hover { background: rgba(255,255,255,0.22); color: #fff; }
        #search-clear.visible { display: flex; }

        /* ── Sin resultados ── */
        #no-results {
            display: none; align-items: center; justify-content: center;
            padding: 1.1rem 1rem;
            font-size: 0.8rem; color: rgba(255,255,255,0.3); letter-spacing: 0.02em;
        }
        #no-results.visible { display: flex; }

        /* ══════════════════════════════════════════════════════
           CARRUSEL
        ══════════════════════════════════════════════════════ */
        .carousel-wrapper {
            display: flex; align-items: stretch; position: relative; overflow: hidden;
        }
        .carousel-arrow {
            flex-shrink: 0; width: 44px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 100%);
            border: none; cursor: pointer; color: rgba(255,255,255,0.65);
            transition: color 0.15s, background 0.15s;
            position: relative; z-index: 2; outline: none;
        }
        #arrow-right {
            background: linear-gradient(to left, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 100%);
        }
        .carousel-arrow:hover { color: #fff; }
        .carousel-arrow:focus-visible { color: #fff; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4); }
        .carousel-arrow:active { color: rgba(255,255,255,0.4); }
        .carousel-arrow.disabled { opacity: 0.15; pointer-events: none; }
        .carousel-arrow svg { width: 20px; height: 20px; stroke-width: 2.5; }

        /* Track */
        #carousel {
            display: flex; gap: 10px;
            overflow-x: scroll; overflow-y: visible;
            flex: 1;
            padding: 4px 4px 12px;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        #carousel::-webkit-scrollbar { display: none; }

        /* ── Cards ── */
        .ch-card {
            flex: 0 0 auto;
            width: 148px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.07);
            cursor: pointer; outline: none; position: relative;
            transition: transform 0.2s cubic-bezier(0.34,1.4,0.64,1),
                        box-shadow 0.2s ease,
                        border-color 0.18s ease,
                        background 0.18s ease;
            display: flex; flex-direction: column;
        }
        .ch-card:hover {
            transform: translateY(-3px) scale(1.03);
            border-color: rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 10px 28px rgba(0,0,0,0.55);
            z-index: 5;
        }
        .ch-card:focus-visible {
            border-color: rgba(255,255,255,0.8);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.4), 0 10px 28px rgba(0,0,0,0.55);
            z-index: 5;
        }
        .ch-card.active {
            border-color: rgba(255,255,255,0.75);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 8px 20px rgba(0,0,0,0.5);
        }
        /* Barra activa verde */
        .ch-card.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px; border-radius: 0 0 11px 11px;
            background: linear-gradient(to right, #22c55e, #4ade80);
            box-shadow: 0 0 10px rgba(34,197,94,0.5);
        }
        /* Shimmer hover */
        .ch-card::before {
            content: ''; position: absolute; inset: 0; z-index: 1; border-radius: 11px;
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 55%);
            opacity: 0; transition: opacity 0.18s ease; pointer-events: none;
        }
        .ch-card:hover::before { opacity: 1; }

        /* Thumbnail */
        .ch-thumb {
            width: 100%; aspect-ratio: 16/9;
            background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .ch-thumb img {
            width: 68%; height: 68%; object-fit: contain;
            opacity: 0.85; transition: opacity 0.18s, transform 0.18s;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.4));
        }
        .ch-card:hover .ch-thumb img, .ch-card.active .ch-thumb img { opacity: 1; transform: scale(1.06); }
        .ch-thumb::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.25) 0%, transparent 100%);
            pointer-events: none;
        }

        /* Body de la card */
        .ch-body {
            padding: 0.4rem 0.6rem 0.5rem;
            display: flex; align-items: center; justify-content: space-between; gap: 4px;
        }
        .ch-name {
            font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.92);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            letter-spacing: -0.01em; flex: 1; min-width: 0;
        }
        .ch-meta { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
        .ch-src-count {
            font-size: 0.5rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
            background: rgba(255,255,255,0.1); border-radius: 4px;
            padding: 2px 5px; color: rgba(255,255,255,0.45);
        }
        .ch-badge-mpd {
            font-size: 0.5rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
            padding: 2px 5px; border-radius: 4px;
            background: rgba(139,92,246,0.18); color: rgba(167,139,250,0.9);
            border: 1px solid rgba(139,92,246,0.3);
        }
        .ch-num {
            position: absolute; top: 5px; left: 6px; z-index: 3;
            font-size: 0.56rem; font-weight: 800; letter-spacing: 0.04em;
            color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.5);
            border-radius: 4px; padding: 1px 5px; backdrop-filter: blur(4px);
            transition: color 0.18s;
        }
        .ch-card.active .ch-num, .ch-card:hover .ch-num { color: rgba(255,255,255,0.65); }

        /* ══════════════════════════════════════════════════════
           TOAST
        ══════════════════════════════════════════════════════ */
        #toast {
            position: fixed; bottom: 1.4rem; left: 50%; z-index: 200;
            transform: translateX(-50%) translateY(10px);
            background: rgba(20,20,20,0.95);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(16px);
            color: rgba(255,255,255,0.88); font-size: 0.78rem; font-weight: 500;
            padding: 0.45rem 1.15rem; border-radius: 999px; white-space: nowrap;
            opacity: 0; pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ══════════════════════════════════════════════════════
           FS HINT
        ══════════════════════════════════════════════════════ */
        #fs-hint {
            position: fixed; top: 50%; left: 50%; z-index: 60;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.76); backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
            padding: 1.5rem 2rem; text-align: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #fs-hint.show { opacity: 1; }
        #fs-hint h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
        #fs-hint p { font-size: 0.78rem; color: rgba(255,255,255,0.45); }
        .fs-key {
            display: inline-block; background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 5px;
            padding: 1px 7px; font-family: monospace; font-size: 0.8rem; color: #fff;
        }

        /* ══════════════════════════════════════════════════════
           RESPONSIVE — MOBILE (≤ 480px)
        ══════════════════════════════════════════════════════ */
        @media (max-width: 480px) {
            /* OSD más compacto */
            #osd { padding: 1rem 1rem 4rem; }
            #osd-logo { width: 42px; height: 42px; border-radius: 10px; padding: 6px; }
            .osd-left { gap: 0.75rem; }
            #osd-title { font-size: clamp(1.2rem, 6vw, 2rem); }
            #osd-source-label { font-size: 0.68rem; }
            .osd-btn { width: 38px; height: 38px; border-radius: 10px; }
            .osd-btn svg { width: 16px; height: 16px; }

            /* UI panel */
            #ui { padding-top: 1.2rem; }
            .ui-header { margin-bottom: 6px; }
            .ui-tabs-row { padding: 0 10px; }
            .ui-search-row { padding: 6px 10px 0; }

            /* Tabs más pequeños en mobile */
            .tab-btn { font-size: 0.6rem; padding: 6px 11px 7px; }

            /* Buscador mobile: altura ajustada */
            #search-wrap { height: 34px; border-radius: 9px; }

            /* Cards más pequeñas en mobile */
            .ch-card { width: 118px; }
            .ch-name { font-size: 0.68rem; }
            #carousel { gap: 8px; padding: 4px 4px 10px; }

            /* Flechas más delgadas */
            .carousel-arrow { width: 34px; }
            .carousel-arrow svg { width: 17px; height: 17px; }

            /* Toast sube un poco por el panel */
            #toast { bottom: 1rem; }
        }

        /* ══════════════════════════════════════════════════════
           RESPONSIVE — SMART TV (≥ 1280px, pointer: coarse / none)
           También aplica en desktop grande con teclado
        ══════════════════════════════════════════════════════ */
        @media (min-width: 1280px) {
            #osd { padding: 2.5rem 3rem 6rem; }
            #osd-logo { width: 76px; height: 76px; border-radius: 16px; padding: 10px; }
            .osd-left { gap: 1.5rem; }
            #osd-title { font-size: clamp(2.2rem, 3.5vw, 4rem); }
            #osd-source-label { font-size: 0.82rem; margin-top: 8px; }
            .osd-btn { width: 52px; height: 52px; border-radius: 13px; }
            .osd-btn svg { width: 22px; height: 22px; }

            .ui-header { margin-bottom: 12px; }
            .ui-tabs-row { padding: 0 20px; }
            .ui-search-row { padding: 10px 20px 0; }
            .tab-btn { font-size: 0.72rem; padding: 8px 18px 9px; }
            #search-wrap { height: 40px; border-radius: 11px; }
            #search-icon-btn { width: 40px; height: 40px; }
            #search-icon-btn svg { width: 16px; height: 16px; }
            #search-input { font-size: 0.88rem; }

            .ch-card { width: 190px; border-radius: 14px; }
            .ch-name { font-size: 0.8rem; }
            .ch-body { padding: 0.5rem 0.75rem 0.6rem; }
            #carousel { gap: 14px; padding: 6px 6px 14px; }
            .carousel-arrow { width: 60px; }
            .carousel-arrow svg { width: 26px; height: 26px; }

            /* Focus visible más prominente en TV */
            .ch-card:focus-visible {
                border-color: #fff;
                box-shadow: 0 0 0 3px rgba(255,255,255,0.5), 0 12px 32px rgba(0,0,0,0.6);
                transform: translateY(-5px) scale(1.05);
            }
            .tab-btn:focus-visible { box-shadow: 0 0 0 3px rgba(255,255,255,0.55); }
        }

        /* TV con pointer grueso (control remoto) — quitar hovers de mouse */
        @media (pointer: coarse) and (min-width: 1280px) {
            .ch-card:hover { transform: none; box-shadow: none; border-color: rgba(255,255,255,0.07); background: rgba(255,255,255,0.06); }
            .carousel-arrow:hover { color: rgba(255,255,255,0.65); }
        }
    </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>


<iframe id="iframe-player"
    allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
    scrolling="no"></iframe>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-label">Conectando…</div>
</div>

<div id="error-state">
    <div class="err-icon">⚠</div>
    <div class="err-text">Sin señal</div>
</div>

<div id="osd">
    <div class="osd-left">
        <img id="osd-logo" src="" alt="">
        <div>
            <div class="live-badge"><div class="live-dot"></div>En vivo</div>
            <div id="osd-title">—</div>
            <div id="osd-source-label"></div>
            <div id="source-switcher"></div>
        </div>
    </div>
    <div class="osd-actions">
        <button class="osd-btn" id="fs-btn" title="Pantalla completa (F)">

// ── ESTADO ────────────────────────────────────────────
const PROXY        = window.location.origin + "/proxy?url=";
let hlsInstance    = null;
let currentChIdx   = -1;
let currentSrcIdx  = 0;
let osdTimer       = null;
let toastTimer     = null;
let fsHintShown    = false;
// Proxy solo para HTTP externo — HTTPS va directo
function proxyUrl(url) {
    if (url.startsWith('https://')) return url;    // HTTPS: directo
    return PROXY + encodeURIComponent(url);        // HTTP externo: por proxy
}

// Devuelve las URLs del canal
function resolveUrls(ch) {
    return ch.urls || [];
}

// ── ELEMENTOS ─────────────────────────────────────────
const video        = document.getElementById('video');
const iframePlayer = document.getElementById('iframe-player');
const loader       = document.getElementById('loader');
const loaderLabel  = document.getElementById('loader-label');
const errorState   = document.getElementById('error-state');
const osd          = document.getElementById('osd');
const osdLogo      = document.getElementById('osd-logo');
const osdTitle     = document.getElementById('osd-title');
const osdSrcLabel  = document.getElementById('osd-source-label');
const srcSwitcher  = document.getElementById('source-switcher');
const ui           = document.getElementById('ui');
const carousel     = document.getElementById('carousel');
const toast        = document.getElementById('toast');
const fsHint       = document.getElementById('fs-hint');
const fsBtn        = document.getElementById('fs-btn');
const fsIconEnter  = document.getElementById('fs-icon-enter');
const fsIconExit   = document.getElementById('fs-icon-exit');

// ── UTILIDADES ────────────────────────────────────────
function showLoader(label = 'Conectando…') {
    loaderLabel.textContent = label;
    loader.classList.add('visible');
    errorState.classList.remove('visible');
}
function hideLoader() { loader.classList.remove('visible'); }
function showError()  { errorState.classList.add('visible'); hideLoader(); }
function hideError()  { errorState.classList.remove('visible'); }

function showToast(msg, duration = 2200) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
}

function showOSD(autohide = true) {
    osd.classList.add('visible');
    ui.classList.add('visible');
    clearTimeout(osdTimer);
    if (autohide) {
        osdTimer = setTimeout(hideOSD, 4000);
    }
}
function hideOSD() {
    osd.classList.remove('visible');
    ui.classList.remove('visible');
}

// ── TABS + BÚSQUEDA ───────────────────────────────────
const GROUPS_ORDER = ['Todos', ...([...new Set(CHANNELS.map(c => c.group))]) ];
let activeGroup   = 'Todos';
let searchQuery   = '';

const tabsRow      = document.getElementById('tabs-row');
const searchWrap   = document.getElementById('search-wrap');
const searchInput  = document.getElementById('search-input');
const searchBtn    = document.getElementById('search-icon-btn');
const searchClear  = document.getElementById('search-clear');
const noResults    = document.getElementById('no-results');

// Construir tabs
GROUPS_ORDER.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (g === 'Todos' ? ' active' : '');
    btn.textContent = g;
    btn.addEventListener('click', () => {
        activeGroup = g;
        searchQuery = '';
        searchInput.value = '';
        searchClear.classList.remove('visible');
        closeSearch();
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent === g));
        applyFilter();
        showOSD();
    });
    tabsRow.appendChild(btn);
});

// El buscador es siempre visible — el botón de ícono ahora solo hace focus
searchBtn.addEventListener('click', () => {
    searchInput.focus();
    showOSD();
});

function clearSearch() {
    searchInput.value = '';
    searchQuery = '';
    searchClear.classList.remove('visible');
    applyFilter();
}

function closeSearch() {
    searchInput.blur();
}

// Botón ×
searchClear.addEventListener('click', () => {
    clearSearch();
    searchInput.focus();
    showOSD();
});

searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value.trim().toLowerCase();
    searchClear.classList.toggle('visible', searchQuery.length > 0);
    // Al buscar saltar a "Todos"
    if (searchQuery) {
        activeGroup = 'Todos';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent === 'Todos'));
    }
    applyFilter();
    showOSD();
});

// Escape cierra buscador
searchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeSearch(); clearSearch(); }
});

// Filtrar canales visibles
function getFilteredIndices() {
    return CHANNELS.reduce((acc, ch, idx) => {
        const matchGroup  = activeGroup === 'Todos' || ch.group === activeGroup;
        const matchSearch = !searchQuery || ch.name.toLowerCase().includes(searchQuery);
        if (matchGroup && matchSearch) acc.push(idx);
        return acc;
    }, []);
}

function applyFilter() {
    const visible = getFilteredIndices();
    carousel.querySelectorAll('.ch-card').forEach(card => {
        card.style.display = visible.includes(parseInt(card.dataset.idx)) ? '' : 'none';
    });
    noResults.classList.toggle('visible', visible.length === 0);
    updateArrowState();
    carousel.scrollTo({ left: 0, behavior: 'instant' });
}

// ── CARRUSEL ──────────────────────────────────────────
function buildCarousel() {
    carousel.innerHTML = '';
    CHANNELS.forEach((ch, idx) => {
        const card = document.createElement('div');
        card.className = 'ch-card';
        card.tabIndex = 0;
        card.dataset.idx = idx;

        const isMPD    = ch.group === 'MPD';
        const srcCount = resolveUrls(ch).length;
        const chNum    = String(idx + 1).padStart(2, '0');

        card.innerHTML = `
            <span class="ch-num">${chNum}</span>
            <div class="ch-thumb">
                <img src="${ch.poster}" alt="${ch.name}" loading="lazy">
            </div>
            <div class="ch-body">
                <div class="ch-name">${ch.name}</div>
                <div class="ch-meta">
                    ${isMPD
                        ? '<span class="ch-badge-mpd">DRM</span>'
                        : srcCount > 1 ? `<span class="ch-src-count">${srcCount}</span>` : ''
                    }
                </div>
            </div>`;

        card.addEventListener('click', () => selectChannel(idx));
        card.addEventListener('keydown', e => { if (e.key === 'Enter') selectChannel(idx); });
        carousel.appendChild(card);
    });
}

function updateCarouselActive(idx) {
    document.querySelectorAll('.ch-card').forEach(c => {
        c.classList.toggle('active', parseInt(c.dataset.idx) === idx);
    });
    if (window._patchedUpdateCarouselActive) {
        window._patchedUpdateCarouselActive(idx);
        return;
    }
    const activeCard = carousel.querySelector(`.ch-card[data-idx="${idx}"]`);
    if (activeCard) {
        activeCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
}

// ── OSD INFO ──────────────────────────────────────────
function updateOSD(chIdx, srcIdx) {
    const ch = CHANNELS[chIdx];
    osdLogo.src  = ch.poster;
    osdTitle.textContent = ch.name;

    if (ch.iframeUrl) {
        osdSrcLabel.textContent = 'DRM · iframe';
        srcSwitcher.innerHTML = '';
    } else {
        const urls = resolveUrls(ch);
        osdSrcLabel.textContent = `Fuente ${srcIdx + 1} de ${urls.length}`;
        srcSwitcher.innerHTML = '';
        if (urls.length > 1) {
            urls.forEach((u, i) => {
                const btn = document.createElement('button');
                btn.className = 'src-btn' + (i === srcIdx ? ' active' : '');
                btn.textContent = `Fuente ${i + 1}`;
                btn.addEventListener('click', () => {
                    currentSrcIdx = i;
                    playSource(chIdx, i);
                    updateOSD(chIdx, i);
                    Cast.updateSource(proxyUrl(u));
                });
                srcSwitcher.appendChild(btn);
            });
        }
    }
}

// ── REPRODUCCIÓN HLS ──────────────────────────────────
function createHLS() {
    return new Hls({
        xhrSetup(xhr) { xhr.withCredentials = false; },
        fetchSetup(context, initParams) {
            return new Request(context.url, { ...initParams, credentials: 'omit' });
        },
        liveSyncDurationCount: 2,
        liveMaxLatencyDurationCount: 4,
        liveDurationInfinity: true,
        maxBufferLength: 8,
        maxMaxBufferLength: 16,
        maxBufferSize: 20 * 1000 * 1000,
        manifestLoadingMaxRetry: 4,
        levelLoadingMaxRetry: 4,
        fragLoadingMaxRetry: 6,
        manifestLoadingRetryDelay: 1000,
        levelLoadingRetryDelay: 1000,
        fragLoadingRetryDelay: 500,
    });
}

function playSource(chIdx, srcIdx) {
    const ch       = CHANNELS[chIdx];
    const urls     = resolveUrls(ch);
    const rawUrl   = urls[srcIdx];
    const url      = proxyUrl(rawUrl);

    // Detener HLS previo
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

    showLoader('Conectando…');
    hideError();

    if (Hls.isSupported()) {
        hlsInstance = createHLS();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            hideLoader();
            video.muted = false;
            video.play().catch(() => {
                // Si el navegador bloquea, intentar muteado y luego desmutear
                video.muted = true;
                video.play().then(() => { video.muted = false; }).catch(() => {});
            });
        });

        hlsInstance.on(Hls.Events.ERROR, (_, data) => {
            if (!data.fatal) return;
            console.warn('HLS fatal error:', data.type, data.details);

            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                // Intentar recuperar
                hlsInstance.startLoad();
                return;
            }

            // Si hay fuente alternativa, cambiar automáticamente
            const ch      = CHANNELS[chIdx];
            const urls    = resolveUrls(ch);
            const nextSrc = srcIdx + 1;
            if (urls && nextSrc < urls.length) {
                showToast(`Fuente ${srcIdx + 1} falló → probando fuente ${nextSrc + 1}`);
                currentSrcIdx = nextSrc;
                playSource(chIdx, nextSrc);
                updateOSD(chIdx, nextSrc);
            } else {
                showError();
            }
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari nativo
        video.src = url;
        video.addEventListener('loadedmetadata', () => { hideLoader(); }, { once: true });
        video.addEventListener('error', () => { showError(); }, { once: true });
        video.muted = false;
        video.play().catch(() => {
            video.muted = true;
            video.play().then(() => { video.muted = false; }).catch(() => {});
        });
    } else {
        showError();
    }
}

// ── SELECCIÓN DE CANAL ────────────────────────────────
function selectChannel(idx) {
    if (idx === currentChIdx) return;
    currentChIdx  = idx;
    currentSrcIdx = 0;

    const ch = CHANNELS[idx];

    // Detener lo que había
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();
    iframePlayer.classList.remove('active');
    iframePlayer.src = '';
    hideError();

    updateCarouselActive(idx);
    updateOSD(idx, 0);
    showOSD();

    if (ch.iframeUrl) {
        // Canal DRM → iframe
        hideLoader();
        iframePlayer.src = ch.iframeUrl;
        iframePlayer.classList.add('active');
        // Notificar al módulo Cast: DRM, no transmitible
        Cast.updateChannel(null, ch.name, ch.poster, true);
    } else {
        // Canal HLS
        playSource(idx, 0);
        // Notificar al módulo Cast con la primera fuente
        Cast.updateChannel(proxyUrl(resolveUrls(ch)[0]), ch.name, ch.poster, false);
    }
}

// ── FULLSCREEN ────────────────────────────────────────
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
}

document.addEventListener('fullscreenchange', () => {
    const isFS = !!document.fullscreenElement;
    fsIconEnter.style.display = isFS ? 'none' : '';
    fsIconExit.style.display  = isFS ? '' : 'none';
});

fsBtn.addEventListener('click', toggleFullscreen);

// ── TECLADO ───────────────────────────────────────────
document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;

    switch (e.key) {
        case 'ArrowRight':
        case 'ArrowDown': {
            e.preventDefault();
            showOSD();
            const visible = getFilteredIndices();
            const pos = visible.indexOf(currentChIdx);
            if (pos < visible.length - 1) selectChannel(visible[pos + 1]);
            break;
        }
        case 'ArrowLeft':
        case 'ArrowUp': {
            e.preventDefault();
            showOSD();
            const visible = getFilteredIndices();
            const pos = visible.indexOf(currentChIdx);
            if (pos > 0) selectChannel(visible[pos - 1]);
            break;
        }
        case 'Enter':
            e.preventDefault();
            if (currentChIdx >= 0) selectChannel(currentChIdx);
            break;
        case 'f':
        case 'F':
            toggleFullscreen();
            break;
        case 'm':
        case 'M':
            video.muted = !video.muted;
            showToast(video.muted ? 'Silenciado' : 'Con sonido');
            break;
        case ' ':
            e.preventDefault();
            showOSD();
            break;
        case 'Escape':
            hideOSD();
            break;
    }
});

// ── MOUSE / TOUCH — mostrar OSD ───────────────────────
let mouseMoveTimer = null;
document.addEventListener('mousemove', () => {
    showOSD();
    clearTimeout(mouseMoveTimer);
    mouseMoveTimer = setTimeout(hideOSD, 4000);
});
document.addEventListener('touchstart', () => { showOSD(); }, { passive: true });

// ── VIDEO EVENTS ─────────────────────────────────────
// "waiting" en live streams se dispara seguido — solo mostrar loader si tarda > 2s
let waitingTimer = null;
video.addEventListener('waiting', () => {
    waitingTimer = setTimeout(() => showLoader('Cargando…'), 2000);
});
video.addEventListener('playing', () => {
    clearTimeout(waitingTimer);
    hideLoader();
    hideError();
});
video.addEventListener('stalled', () => {
    clearTimeout(waitingTimer);
    waitingTimer = setTimeout(() => showLoader('Sin señal…'), 3000);
});
video.addEventListener('error', () => {
    clearTimeout(waitingTimer);
    showError();
});

// ── FS HINT (solo una vez, desktop sin fullscreen) ────
setTimeout(() => {
    const isMobile = /Mobi|Android/i.test(navigator.userAgent);
    if (!isMobile && !document.fullscreenElement && !fsHintShown) {
        fsHintShown = true;
        fsHint.classList.add('show');
        setTimeout(() => fsHint.classList.remove('show'), 4000);
    }
}, 3000);

// ── FLECHAS DEL CARRUSEL ──────────────────────────────
const arrowLeft  = document.getElementById('arrow-left');
const arrowRight = document.getElementById('arrow-right');

const CARD_W = 160; // debe coincidir con CSS width
const CARD_GAP = 10;

function cardStep() {
    return CARD_W + CARD_GAP;
}

function visibleCount() {
    return Math.max(1, Math.floor(carousel.offsetWidth / cardStep()));
}

function getCarouselScroll() {
    return carousel.scrollLeft;
}

function updateArrowState() {
    const atStart = carousel.scrollLeft <= 2;
    const atEnd   = carousel.scrollLeft + carousel.offsetWidth >= carousel.scrollWidth - 2;
    arrowLeft.classList.toggle('disabled', atStart);
    arrowRight.classList.toggle('disabled', atEnd);
}

// Scroll suave usando scrollLeft nativo
function scrollCarouselTo(px, smooth = true) {
    carousel.scrollTo({ left: px, behavior: smooth ? 'smooth' : 'instant' });
}

arrowLeft.addEventListener('click', () => {
    const step = cardStep(); // 1 card por vez
    scrollCarouselTo(Math.max(0, carousel.scrollLeft - step));
    showOSD();
});
arrowRight.addEventListener('click', () => {
    const step = cardStep(); // 1 card por vez
    const max  = carousel.scrollWidth - carousel.offsetWidth;
    scrollCarouselTo(Math.min(max, carousel.scrollLeft + step));
    showOSD();
});

carousel.addEventListener('scroll', () => { updateArrowState(); showOSD(); }, { passive: true });

// Asegurarse que la card activa sea visible al seleccionar
function scrollCarouselToIdx(idx) {
    const cardLeft  = idx * cardStep();
    const cardRight = cardLeft + CARD_W;
    const viewLeft  = carousel.scrollLeft;
    const viewRight = viewLeft + carousel.offsetWidth;

    if (cardLeft < viewLeft) {
        scrollCarouselTo(cardLeft);
    } else if (cardRight > viewRight) {
        scrollCarouselTo(cardRight - carousel.offsetWidth + CARD_GAP);
    }
}

window._patchedUpdateCarouselActive = function(idx) {
    document.querySelectorAll('.ch-card').forEach(c => {
        c.classList.toggle('active', parseInt(c.dataset.idx) === idx);
    });
    // Scroll a la card activa si es visible
    const activeCard = carousel.querySelector(`.ch-card[data-idx="${idx}"]`);
    if (activeCard && activeCard.style.display !== 'none') {
        const cardLeft  = activeCard.offsetLeft;
        const cardRight = cardLeft + activeCard.offsetWidth;
        const viewLeft  = carousel.scrollLeft;
        const viewRight = viewLeft + carousel.offsetWidth;
        if (cardLeft < viewLeft) {
            carousel.scrollTo({ left: cardLeft, behavior: 'smooth' });
        } else if (cardRight > viewRight) {
            carousel.scrollTo({ left: cardRight - carousel.offsetWidth + CARD_GAP, behavior: 'smooth' });
        }
    }
};

// ── INIT ─────────────────────────────────────────────
buildCarousel();
applyFilter();
Cast.init(showToast);
updateArrowState();
selectChannel(0);
</script>

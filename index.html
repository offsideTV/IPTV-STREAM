<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IPTV — Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="cast.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: #000; color: #fff; }
        body { font-family: system-ui, -apple-system, sans-serif; -webkit-user-select: none; user-select: none; }

        #video {
            position: fixed; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; background: #000;
        }

        /* ── LOADER ── */
        #loader {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 0.6rem;
            background: rgba(0,0,0,0.78); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 1.4rem 2rem; min-width: 160px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #loader.visible { opacity: 1; }
        .spinner {
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1); border-top-color: #fff;
            animation: spin 0.75s linear infinite;
        }
        #loader-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); letter-spacing: 0.04em; text-align: center; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ERROR ── */
        #error-state {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 45;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 0.4rem;
            background: rgba(0,0,0,0.78); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 1.2rem 1.8rem; min-width: 160px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #error-state.visible { opacity: 1; }
        .err-icon { font-size: 1.6rem; opacity: 0.45; }
        .err-text { font-size: 0.78rem; color: rgba(255,255,255,0.45); text-align: center; }

        /* ── OSD ── */
        #osd {
            position: fixed; top: 0; left: 0; right: 0; z-index: 30;
            padding: 2rem 2.5rem 5rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.88) 0%, transparent 100%);
            display: flex; align-items: flex-start; justify-content: space-between;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #osd.visible { opacity: 1; pointer-events: auto; }
        .osd-left { display: flex; align-items: flex-start; gap: 1.25rem; }
        #osd-logo {
            width: 64px; height: 64px; border-radius: 14px;
            object-fit: contain; background: rgba(255,255,255,0.08);
            padding: 8px; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .live-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: #f87171; margin-bottom: 5px;
        }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%; background: #ef4444;
            animation: blink 1.4s ease infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
        #osd-title {
            font-size: clamp(1.8rem, 4.5vw, 3.2rem);
            font-weight: 800; line-height: 1; letter-spacing: -0.03em;
        }
        #osd-source-label { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-top: 6px; font-weight: 500; }
        #source-switcher { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .src-btn {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
            text-transform: uppercase; padding: 4px 10px;
            border-radius: 6px; border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
            cursor: pointer; transition: all 0.15s ease;
        }
        .src-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .src-btn.active { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.45); }
        .osd-actions { display: flex; align-items: flex-start; gap: 0.5rem; padding-top: 4px; }
        .osd-btn {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 10px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer; color: #fff;
            transition: background 0.15s ease, transform 0.1s ease;
        }
        .osd-btn:hover { background: rgba(255,255,255,0.2); }
        .osd-btn:active { transform: scale(0.93); }
        .osd-btn svg { width: 18px; height: 18px; }

        /* ── UI INFERIOR ── */
        #ui {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
            padding: 5rem 0 calc(1.5rem + env(safe-area-inset-bottom, 0px));
            background: linear-gradient(to top, rgba(0,0,0,0.97) 40%, transparent 100%);
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
            overflow: visible;
        }
        #ui.visible { opacity: 1; pointer-events: auto; }
        .ui-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 0.7rem; padding: 0 1rem 0 1.2rem;
        }
        .ui-header-left { display: flex; align-items: center; gap: 0.75rem; }
        .ui-title {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; color: rgba(255,255,255,0.38);
        }
        .ui-ch-count {
            font-size: 0.65rem; font-weight: 600;
            color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); border-radius: 20px;
            padding: 2px 8px; border: 1px solid rgba(255,255,255,0.07);
        }
        .ui-hint { display: none; }
        .brand { font-size: 0.82rem; font-weight: 800; letter-spacing: -0.04em; color: rgba(255,255,255,0.3); }
        .brand em { color: rgba(255,255,255,0.12); font-style: normal; }

        /* ── CHANNEL SHELF ── */
        .carousel-wrapper {
            display: flex; align-items: stretch; position: relative;
            overflow: hidden;
        }

        /* Flechas laterales — anchas, full-height, glassmorphism */
        .carousel-arrow {
            flex-shrink: 0; width: 52px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.35) 100%);
            border: none; cursor: pointer; color: rgba(255,255,255,0.7);
            transition: color 0.15s ease, background 0.15s ease;
            position: relative; z-index: 2;
        }
        #arrow-right {
            background: linear-gradient(to left, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.35) 100%);
        }
        .carousel-arrow:hover { color: #fff; }
        .carousel-arrow:active { color: rgba(255,255,255,0.5); }
        .carousel-arrow.disabled { opacity: 0.18; pointer-events: none; }
        .carousel-arrow svg { width: 22px; height: 22px; stroke-width: 2; }

        /* Track del carrusel */
        #carousel {
            display: flex; gap: 10px;
            overflow: hidden;
            flex: 1;
            padding: 6px 4px 10px;
            min-height: 120px;
            position: relative;
        }

        /* Cards horizontales tipo Netflix/TV shelf */
        .ch-card {
            flex: 0 0 auto;
            width: 160px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.07);
            cursor: pointer; outline: none; position: relative;
            transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 0.22s ease,
                        border-color 0.2s ease,
                        background 0.2s ease;
            display: flex; flex-direction: column;
        }
        .ch-card:hover, .ch-card:focus {
            transform: translateY(-4px) scale(1.03);
            border-color: rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 12px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
            z-index: 5;
        }
        .ch-card.active {
            border-color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.18), 0 8px 24px rgba(0,0,0,0.5);
        }
        .ch-card.active:hover, .ch-card.active:focus {
            transform: translateY(-4px) scale(1.03);
        }

        /* Indicador activo — barra inferior */
        .ch-card.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px; border-radius: 0 0 12px 12px;
            background: linear-gradient(to right, #22c55e, #4ade80);
            box-shadow: 0 0 12px rgba(34,197,94,0.5);
        }

        /* Thumbnail con logo grande centrado */
        .ch-thumb {
            width: 100%; aspect-ratio: 16/9;
            background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .ch-thumb::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 70%);
            pointer-events: none;
        }
        .ch-thumb img {
            width: 72%; height: 72%; object-fit: contain;
            opacity: 0.88; transition: opacity 0.2s ease, transform 0.2s ease;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
        }
        .ch-card:hover .ch-thumb img,
        .ch-card:focus .ch-thumb img,
        .ch-card.active .ch-thumb img {
            opacity: 1;
            transform: scale(1.05);
        }

        /* Info inferior */
        .ch-body {
            padding: 0.45rem 0.65rem 0.55rem;
            display: flex; align-items: center; justify-content: space-between; gap: 4px;
        }
        .ch-name {
            font-size: 0.74rem; font-weight: 700; color: rgba(255,255,255,0.92);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            letter-spacing: -0.01em; flex: 1; min-width: 0;
        }
        .ch-meta {
            display: flex; align-items: center; gap: 3px; flex-shrink: 0;
        }
        .ch-src-count {
            font-size: 0.52rem; font-weight: 700; letter-spacing: 0.06em;
            text-transform: uppercase;
            background: rgba(255,255,255,0.1); border-radius: 4px;
            padding: 2px 5px; color: rgba(255,255,255,0.45);
        }
        .ch-badge-mpd {
            font-size: 0.52rem; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; padding: 2px 5px; border-radius: 4px;
            background: rgba(139,92,246,0.18); color: rgba(167,139,250,0.9);
            border: 1px solid rgba(139,92,246,0.3);
        }

        /* Número de canal flotante */
        .ch-num {
            position: absolute; top: 6px; left: 7px; z-index: 3;
            font-size: 0.58rem; font-weight: 800; letter-spacing: 0.04em;
            color: rgba(255,255,255,0.32);
            background: rgba(0,0,0,0.45);
            border-radius: 4px; padding: 1px 5px;
            backdrop-filter: blur(4px);
            transition: color 0.2s ease;
        }
        .ch-card.active .ch-num,
        .ch-card:hover .ch-num { color: rgba(255,255,255,0.6); }

        /* Shimmer en hover */
        .ch-card::before {
            content: ''; position: absolute; inset: 0; z-index: 1; border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 55%);
            opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
        }
        .ch-card:hover::before, .ch-card:focus::before { opacity: 1; }

        /* Gradiente inferior del thumb */
        .ch-thumb::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 45%;
            background: linear-gradient(to top, rgba(0,0,0,0.28) 0%, transparent 100%);
            pointer-events: none;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 1.5rem; left: 50%; z-index: 200;
            transform: translateX(-50%) translateY(8px);
            background: rgba(25,25,25,0.92);
            border: 1px solid rgba(255,255,255,0.13);
            backdrop-filter: blur(14px);
            color: rgba(255,255,255,0.85); font-size: 0.78rem; font-weight: 500;
            padding: 0.45rem 1.1rem; border-radius: 999px; white-space: nowrap;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── FS HINT ── */
        #fs-hint {
            position: fixed; top: 50%; left: 50%; z-index: 60;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.72); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
            padding: 1.5rem 2rem; text-align: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #fs-hint.show { opacity: 1; }
        #fs-hint h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
        #fs-hint p { font-size: 0.78rem; color: rgba(255,255,255,0.45); }
        .fs-key {
            display: inline-block; background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 5px;
            padding: 1px 7px; font-family: monospace; font-size: 0.8rem; color: #fff;
        }

        /* carousel — scroll interno sin scrollbar visible */
        #carousel::-webkit-scrollbar { display: none; }
        #carousel {
            scrollbar-width: none;
            overflow-x: scroll !important;
            scroll-behavior: smooth;
        }

        /* ── IFRAME MODE ── */
        #iframe-player {
            position: fixed; inset: 0; width: 100%; height: 100%;
            z-index: 1; border: none; background: #000; display: none;
        }
        #iframe-player.active { display: block; }

        /* ── UNMUTE OVERLAY ── */
        #unmute-overlay {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #unmute-overlay.visible { opacity: 1; pointer-events: auto; }
        #unmute-btn {
            display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22);
            border-radius: 20px; padding: 2rem 2.8rem; cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease; color: #fff;
        }
        #unmute-btn:hover { background: rgba(255,255,255,0.18); }
        #unmute-btn:active { transform: scale(0.96); }
        #unmute-btn svg { width: 44px; height: 44px; opacity: 0.9; }
        #unmute-btn span { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.04em; opacity: 0.7; }
    </style>
</head>

</div>

<div id="ui">

        <div class="brand"></div>
    </div>
    <div class="carousel-wrapper">
        <button class="carousel-arrow" id="arrow-left" title="Anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        <div id="carousel"></div>
        <button class="carousel-arrow" id="arrow-right" title="Siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
    </div>
</div>

<div id="toast"></div>

<div id="fs-hint">

    <p>Presioná <span class="fs-key">F</span> o el botón <span class="fs-key">⤢</span> arriba a la derecha</p>

// ── ESTADO ────────────────────────────────────────────
const PROXY        = window.location.origin + "/proxy?url=";
let hlsInstance    = null;
let currentChIdx   = -1;
let currentSrcIdx  = 0;
let osdTimer       = null;
let toastTimer     = null;
let fsHintShown    = false;
let isLocalNetwork = false; // se actualiza al init con detección automática

// Proxy solo para HTTP externo — HTTPS y URLs de red local van directo
function isLocalUrl(url) {
    return /^http:\/\/(192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(url);
}
function proxyUrl(url) {
    if (url.startsWith('https://')) return url;    // HTTPS: directo
    if (isLocalUrl(url))           return url;    // IP privada: directo (Render no llega)
    return PROXY + encodeURIComponent(url);        // HTTP externo: por proxy
}

// Detección de red local: intenta hacer un request directo al servidor IPTV.
// Usamos una imagen/recurso pequeño con XMLHttpRequest (más confiable que fetch no-cors
// para detectar si la IP es alcanzable en la red local).
const LOCAL_GATEWAY = 'http://192.168.248.5';
async function detectLocalNetwork() {
    return new Promise(resolve => {
        const xhr = new XMLHttpRequest();
        const done = (result) => { isLocalNetwork = result; resolve(); };
        const timeout = setTimeout(() => { xhr.abort(); done(false); }, 2000);
        xhr.open('GET', LOCAL_GATEWAY + '/ping', true);
        xhr.onload  = () => { clearTimeout(timeout); done(true); };
        xhr.onerror = () => { clearTimeout(timeout); done(false); };
        xhr.onabort = () => done(false);
        xhr.send();
    }).then(() => console.log('[IPTV] Red local:', isLocalNetwork));
}

// Devuelve las URLs efectivas del canal según la red actual
// En red local: URLs locales primero, luego globales como fallback
// Fuera: solo globales
function resolveUrls(ch) {
    if (isLocalNetwork && ch.urlsLocal && ch.urlsLocal.length > 0) {
        return [...ch.urlsLocal, ...(ch.urls || [])];
    }
    return ch.urls || [];
}

// ── ELEMENTOS ─────────────────────────────────────────
const video        = document.getElementById('video');
const iframePlayer = document.getElementById('iframe-player');
const loader       = document.getElementById('loader');
const loaderLabel  = document.getElementById('loader-label');
const errorState   = document.getElementById('error-state');
const osd          = document.getElementById('osd');
const osdLogo      = document.getElementById('osd-logo');
const osdTitle     = document.getElementById('osd-title');
const osdSrcLabel  = document.getElementById('osd-source-label');
const srcSwitcher  = document.getElementById('source-switcher');
const ui           = document.getElementById('ui');
const carousel     = document.getElementById('carousel');
const toast        = document.getElementById('toast');
const fsHint       = document.getElementById('fs-hint');
const fsBtn        = document.getElementById('fs-btn');
const fsIconEnter  = document.getElementById('fs-icon-enter');
const fsIconExit   = document.getElementById('fs-icon-exit');
const unmuteOverlay = document.getElementById('unmute-overlay');
const unmuteBtn    = document.getElementById('unmute-btn');

// ── UTILIDADES ────────────────────────────────────────
function showLoader(label = 'Conectando…') {
    loaderLabel.textContent = label;
    loader.classList.add('visible');
    errorState.classList.remove('visible');
}
function hideLoader() { loader.classList.remove('visible'); }
function showError()  { errorState.classList.add('visible'); hideLoader(); }
function hideError()  { errorState.classList.remove('visible'); }

function showToast(msg, duration = 2200) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
}

function showOSD(autohide = true) {
    osd.classList.add('visible');
    ui.classList.add('visible');
    clearTimeout(osdTimer);
    if (autohide) {
        osdTimer = setTimeout(hideOSD, 4000);
    }
}
function hideOSD() {
    osd.classList.remove('visible');
    ui.classList.remove('visible');
}

// ── CARRUSEL ──────────────────────────────────────────
function buildCarousel() {
    carousel.innerHTML = '';
    CHANNELS.forEach((ch, idx) => {
        const card = document.createElement('div');
        card.className = 'ch-card';
        card.tabIndex = 0;
        card.dataset.idx = idx;

        const isMPD    = ch.group === 'MPD';
        const srcCount = resolveUrls(ch).length;
        const chNum    = String(idx + 1).padStart(2, '0');

        card.innerHTML = `
            <span class="ch-num">${chNum}</span>
            <div class="ch-thumb">
                <img src="${ch.poster}" alt="${ch.name}" loading="lazy">
            </div>
            <div class="ch-body">
                <div class="ch-name">${ch.name}</div>
                <div class="ch-meta">
                    ${isMPD
                        ? '<span class="ch-badge-mpd">DRM</span>'
                        : srcCount > 1 ? `<span class="ch-src-count">${srcCount}</span>` : ''
                    }
                </div>
            </div>`;

        card.addEventListener('click', () => selectChannel(idx));
        card.addEventListener('keydown', e => { if (e.key === 'Enter') selectChannel(idx); });
        carousel.appendChild(card);
    });

    // Actualizar contador
    const countEl = document.getElementById('ch-count');
    if (countEl) countEl.textContent = CHANNELS.length + ' canales';
}

function updateCarouselActive(idx) {
    document.querySelectorAll('.ch-card').forEach((c, i) => {
        c.classList.toggle('active', i === idx);
    });
    // Si ya fue parcheado por el init, usar la versión con flechas
    if (window._patchedUpdateCarouselActive) {
        window._patchedUpdateCarouselActive(idx);
        return;
    }
    // fallback: scroll suave a la card activa
    const activeCard = carousel.children[idx];
    if (activeCard) {
        activeCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
}

// ── OSD INFO ──────────────────────────────────────────
function updateOSD(chIdx, srcIdx) {
    const ch = CHANNELS[chIdx];
    osdLogo.src  = ch.poster;
    osdTitle.textContent = ch.name;

    if (ch.iframeUrl) {
        osdSrcLabel.textContent = 'DRM · iframe';
        srcSwitcher.innerHTML = '';
    } else {
        const urls = resolveUrls(ch);
        osdSrcLabel.textContent = `Fuente ${srcIdx + 1} de ${urls.length}${isLocalNetwork && ch.urlsLocal?.length ? ' · 🏠 local' : ''}`;
        srcSwitcher.innerHTML = '';
        if (urls.length > 1) {
            urls.forEach((u, i) => {
                const btn = document.createElement('button');
                btn.className = 'src-btn' + (i === srcIdx ? ' active' : '');
                const isLocal = ch.urlsLocal && i < ch.urlsLocal.length;
                btn.textContent = isLocal ? `Fuente ${i + 1} ·local` : `Fuente ${i + 1}`;
                btn.addEventListener('click', () => {
                    currentSrcIdx = i;
                    playSource(chIdx, i);
                    updateOSD(chIdx, i);
                    Cast.updateSource(proxyUrl(u));
                });
                srcSwitcher.appendChild(btn);
            });
        }
    }
}

// ── REPRODUCCIÓN HLS ──────────────────────────────────
function createHLS() {
    return new Hls({
        xhrSetup(xhr) { xhr.withCredentials = false; },
        fetchSetup(context, initParams) {
            return new Request(context.url, { ...initParams, credentials: 'omit' });
        },
        liveSyncDurationCount: 2,
        liveMaxLatencyDurationCount: 4,
        liveDurationInfinity: true,
        maxBufferLength: 8,
        maxMaxBufferLength: 16,
        maxBufferSize: 20 * 1000 * 1000,
        manifestLoadingMaxRetry: 4,
        levelLoadingMaxRetry: 4,
        fragLoadingMaxRetry: 6,
        manifestLoadingRetryDelay: 1000,
        levelLoadingRetryDelay: 1000,
        fragLoadingRetryDelay: 500,
    });
}

function playSource(chIdx, srcIdx) {
    const ch       = CHANNELS[chIdx];
    const urls     = resolveUrls(ch);
    const rawUrl   = urls[srcIdx];
    const url      = proxyUrl(rawUrl);

    // Detener HLS previo
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

    showLoader('Conectando…');
    hideError();

    if (Hls.isSupported()) {
        hlsInstance = createHLS();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            hideLoader();
            video.muted = false;
            video.play().catch(() => {
                // Navegador bloqueó audio → silenciar y reintentar
                video.muted = true;
                video.play().catch(() => {});
                unmuteOverlay.classList.add('visible');
            });
        });

        hlsInstance.on(Hls.Events.ERROR, (_, data) => {
            if (!data.fatal) return;
            console.warn('HLS fatal error:', data.type, data.details);

            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                // Intentar recuperar
                hlsInstance.startLoad();
                return;
            }

            // Si hay fuente alternativa, cambiar automáticamente
            const ch      = CHANNELS[chIdx];
            const urls    = resolveUrls(ch);
            const nextSrc = srcIdx + 1;
            if (urls && nextSrc < urls.length) {
                showToast(`Fuente ${srcIdx + 1} falló → probando fuente ${nextSrc + 1}`);
                currentSrcIdx = nextSrc;
                playSource(chIdx, nextSrc);
                updateOSD(chIdx, nextSrc);
            } else {
                showError();
            }
        });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari nativo
        video.src = url;
        video.addEventListener('loadedmetadata', () => { hideLoader(); }, { once: true });
        video.addEventListener('error', () => { showError(); }, { once: true });
        video.muted = false;
        video.play().catch(() => {
            video.muted = true;
            video.play().catch(() => {});
            unmuteOverlay.classList.add('visible');
        });
    } else {
        showError();
    }
}

// ── SELECCIÓN DE CANAL ────────────────────────────────
function selectChannel(idx) {
    if (idx === currentChIdx) return;
    currentChIdx  = idx;
    currentSrcIdx = 0;

    const ch = CHANNELS[idx];

    // Detener lo que había
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();
    iframePlayer.classList.remove('active');
    iframePlayer.src = '';
    hideError();

    updateCarouselActive(idx);
    updateOSD(idx, 0);
    showOSD();

    if (ch.iframeUrl) {
        // Canal DRM → iframe
        hideLoader();
        iframePlayer.src = ch.iframeUrl;
        iframePlayer.classList.add('active');
        // Notificar al módulo Cast: DRM, no transmitible
        Cast.updateChannel(null, ch.name, ch.poster, true);
    } else {
        // Canal HLS
        playSource(idx, 0);
        // Notificar al módulo Cast con la primera fuente
        Cast.updateChannel(proxyUrl(resolveUrls(ch)[0]), ch.name, ch.poster, false);
    }
}

// ── FULLSCREEN ────────────────────────────────────────
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
}

document.addEventListener('fullscreenchange', () => {
    const isFS = !!document.fullscreenElement;
    fsIconEnter.style.display = isFS ? 'none' : '';
    fsIconExit.style.display  = isFS ? '' : 'none';
});

fsBtn.addEventListener('click', toggleFullscreen);

// ── TECLADO ───────────────────────────────────────────
document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;

    switch (e.key) {
        case 'ArrowRight':
        case 'ArrowDown':
            e.preventDefault();
            showOSD();
            if (currentChIdx < CHANNELS.length - 1) selectChannel(currentChIdx + 1);
            break;
        case 'ArrowLeft':
        case 'ArrowUp':
            e.preventDefault();
            showOSD();
            if (currentChIdx > 0) selectChannel(currentChIdx - 1);
            break;
        case 'Enter':
            e.preventDefault();
            if (currentChIdx >= 0) selectChannel(currentChIdx);
            break;
        case 'f':
        case 'F':
            toggleFullscreen();
            break;
        case 'm':
        case 'M':
            video.muted = !video.muted;
            showToast(video.muted ? 'Silenciado' : 'Con sonido');
            break;
        case ' ':
            e.preventDefault();
            showOSD();
            break;
        case 'Escape':
            hideOSD();
            break;
    }
});

// ── MOUSE / TOUCH — mostrar OSD ───────────────────────
let mouseMoveTimer = null;
document.addEventListener('mousemove', () => {
    showOSD();
    clearTimeout(mouseMoveTimer);
    mouseMoveTimer = setTimeout(hideOSD, 4000);
});
document.addEventListener('touchstart', () => { showOSD(); }, { passive: true });

// ── UNMUTE ────────────────────────────────────────────
unmuteBtn.addEventListener('click', () => {
    video.muted = false;
    video.play().catch(() => {});
    unmuteOverlay.classList.remove('visible');
});

// ── VIDEO EVENTS ─────────────────────────────────────
// "waiting" en live streams se dispara seguido — solo mostrar loader si tarda > 2s
let waitingTimer = null;
video.addEventListener('waiting', () => {
    waitingTimer = setTimeout(() => showLoader('Cargando…'), 2000);
});
video.addEventListener('playing', () => {
    clearTimeout(waitingTimer);
    hideLoader();
    hideError();
});
video.addEventListener('stalled', () => {
    clearTimeout(waitingTimer);
    waitingTimer = setTimeout(() => showLoader('Sin señal…'), 3000);
});
video.addEventListener('error', () => {
    clearTimeout(waitingTimer);
    showError();
});

// ── FS HINT (solo una vez, desktop sin fullscreen) ────
setTimeout(() => {
    const isMobile = /Mobi|Android/i.test(navigator.userAgent);
    if (!isMobile && !document.fullscreenElement && !fsHintShown) {
        fsHintShown = true;
        fsHint.classList.add('show');
        setTimeout(() => fsHint.classList.remove('show'), 4000);
    }
}, 3000);

// ── FLECHAS DEL CARRUSEL ──────────────────────────────
const arrowLeft  = document.getElementById('arrow-left');
const arrowRight = document.getElementById('arrow-right');

const CARD_W = 160; // debe coincidir con CSS width
const CARD_GAP = 10;

function cardStep() {
    return CARD_W + CARD_GAP;
}

function visibleCount() {
    return Math.max(1, Math.floor(carousel.offsetWidth / cardStep()));
}

function getCarouselScroll() {
    return carousel.scrollLeft;
}

function updateArrowState() {
    const atStart = carousel.scrollLeft <= 2;
    const atEnd   = carousel.scrollLeft + carousel.offsetWidth >= carousel.scrollWidth - 2;
    arrowLeft.classList.toggle('disabled', atStart);
    arrowRight.classList.toggle('disabled', atEnd);
}

// Scroll suave usando scrollLeft nativo
function scrollCarouselTo(px, smooth = true) {
    carousel.scrollTo({ left: px, behavior: smooth ? 'smooth' : 'instant' });
}

arrowLeft.addEventListener('click', () => {
    const step = cardStep() * visibleCount();
    scrollCarouselTo(Math.max(0, carousel.scrollLeft - step));
    showOSD();
});
arrowRight.addEventListener('click', () => {
    const step = cardStep() * visibleCount();
    const max  = carousel.scrollWidth - carousel.offsetWidth;
    scrollCarouselTo(Math.min(max, carousel.scrollLeft + step));
    showOSD();
});

carousel.addEventListener('scroll', updateArrowState, { passive: true });

// Asegurarse que la card activa sea visible al seleccionar
function scrollCarouselToIdx(idx) {
    const cardLeft  = idx * cardStep();
    const cardRight = cardLeft + CARD_W;
    const viewLeft  = carousel.scrollLeft;
    const viewRight = viewLeft + carousel.offsetWidth;

    if (cardLeft < viewLeft) {
        scrollCarouselTo(cardLeft);
    } else if (cardRight > viewRight) {
        scrollCarouselTo(cardRight - carousel.offsetWidth + CARD_GAP);
    }
}

window._patchedUpdateCarouselActive = function(idx) {
    document.querySelectorAll('.ch-card').forEach((c, i) => {
        c.classList.toggle('active', i === idx);
    });
    scrollCarouselToIdx(idx);
};

// ── INIT ─────────────────────────────────────────────
// Primero detectar si estamos en red local, luego arrancar
showLoader('Detectando red…');
detectLocalNetwork().then(() => {
    if (isLocalNetwork) showToast('Red local detectada', 3000);
    buildCarousel();
    Cast.init(showToast);
    updateArrowState();
    selectChannel(0);
});
